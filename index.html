<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR v18.8</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --blue: #007aff; --gold: #ffcc00; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #main-ui { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; box-sizing: border-box; height: 100vh; display: flex; flex-direction: column; }
        #map { flex-grow: 1; min-height: 60vh; border-radius: 20px; border: 1px solid var(--border); background: #050505; margin-bottom: 15px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 10px; }
        .info-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 15px; text-align: center; }
        .info-card b { font-size: 14px; color: var(--blue); display: block; margin-top: 4px; }
        .info-card span { font-size: 8px; opacity: 0.4; text-transform: uppercase; }
        
        /* ДИНАМИЧЕСКИЙ РАЗМЕР И ЦВЕТ */
        .tornado-marker { 
            text-align: center; 
            animation: spin 0.8s infinite linear; 
            filter: drop-shadow(0 0 15px red); 
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .leaflet-popup-content-wrapper { background: var(--card); color: #fff; border: 1px solid var(--border); border-radius: 12px; }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="map"></div>
    <div class="info-grid">
        <div class="info-card"><span>РЕКОРД</span><b id="top-record" style="color:var(--gold)">0 КМ/Ч</b></div>
        <div class="info-card"><span>MAX ВЕТЕР</span><b id="wind-val">--</b></div>
        <div class="info-card"><span>ОБЪЕКТЫ</span><b id="obj-val">0</b></div>
    </div>
</div>

<script>
    let map, activeTornadoes = {};
    const points = [
        {id: 1, lat: 35.4, lon: -97.5, name: 'Oklahoma', vx: 0, vy: 0}, 
        {id: 2, lat: 49.9, lon: 36.2, name: 'Kharkiv', vx: 0, vy: 0}, 
        {id: 3, lat: 31.9, lon: -99.9, name: 'Texas', vx: 0, vy: 0},
        {id: 4, lat: 41.1, lon: -98.2, name: 'Nebraska', vx: 0, vy: 0}
    ];

    // Настройка цвета и размера по шкале Фудзиты
    const fSettings = {
        "F0": { size: 30, color: "#ffffff" },
        "F1": { size: 40, color: "#ffff00" },
        "F2": { size: 50, color: "#ff9900" },
        "F3": { size: 65, color: "#ff3300" },
        "F4": { size: 80, color: "#ff0000" },
        "F5": { size: 100, color: "#9900ff" }
    };

    function getF(w) {
        if (w < 117) return "F0"; if (w < 181) return "F1";
        if (w < 253) return "F2"; if (w < 332) return "F3";
        if (w < 418) return "F4"; return "F5";
    }

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35, -95], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        setTimeout(() => { map.invalidateSize(); }, 500);
        document.getElementById('top-record').innerText = (localStorage.getItem('tornado_top') || 0) + " КМ/Ч";
        requestAnimationFrame(smoothMove);
        updateData();
        setInterval(updateData, 15000);
    }

    function smoothMove() {
        for (let p of points) {
            if (activeTornadoes[p.id]) {
                p.lat += p.vx; p.lon += p.vy;
                activeTornadoes[p.id].marker.setLatLng([p.lat, p.lon]);
                
                if (Math.random() > 0.9) {
                    p.history.push([p.lat, p.lon]);
                    if(p.history.length > 50) p.history.shift();
                    activeTornadoes[p.id].line.setLatLngs(p.history);
                }
            }
        }
        requestAnimationFrame(smoothMove);
    }

    async function updateData() {
        let found = 0; let maxW = 0;
        for (let p of points) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current=wind_gusts_10m,wind_direction_10m&_=${Date.now()}`);
                const data = await res.json();
                const wind = Math.round(data.current.wind_gusts_10m);
                const angle = data.current.wind_direction_10m;
                if (wind > maxW) maxW = wind;

                if (wind > 30) {
                    found++;
                    const rad = (angle - 90) * (Math.PI / 180);
                    p.vx = -Math.sin(rad) * 0.0000005;
                    p.vy = Math.cos(rad) * 0.0000005;
                    
                    const f = getF(wind);
                    const config = fSettings[f];

                    if (!activeTornadoes[p.id]) {
                        p.history = [[p.lat, p.lon]];
                        const m = L.marker([p.lat, p.lon], {
                            icon: L.divIcon({ 
                                className: 'none', 
                                html: `<div class="tornado-marker" style="font-size: ${config.size}px">🌪️</div>`, 
                                iconSize: [config.size, config.size] 
                            })
                        }).addTo(map).bindPopup(`<b>${p.name}</b><br>Скорость: ${wind} км/ч<br>Ранг: ${f}`);
                        
                        const l = L.polyline(p.history, {color: config.color, weight: 3, opacity: 0.6}).addTo(map);
                        activeTornadoes[p.id] = { marker: m, line: l };
                    } else {
                        // Обновляем попап и стиль если ранг изменился
                        activeTornadoes[p.id].marker.setPopupContent(`<b>${p.name}</b><br>Скорость: ${wind} км/ч<br>Ранг: ${f}`);
                        activeTornadoes[p.id].line.setStyle({color: config.color});
                    }
                }
            } catch (e) {}
        }
        document.getElementById('obj-val').innerText = found;
        document.getElementById('wind-val').innerText = maxW + " КМ/Ч";
    }
    window.onload = initMap;
</script>
</body>
</html>
