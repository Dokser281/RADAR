<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR v18.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --blue: #007aff; --gold: #ffcc00; --accent: #ff3b30; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #main-ui { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; box-sizing: border-box; height: 100vh; }
        #map { height: 65vh; border-radius: 20px; border: 1px solid var(--border); background: #000; margin-bottom: 15px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .info-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 15px; text-align: center; }
        .info-card b { font-size: 14px; color: var(--blue); display: block; margin-top: 4px; }
        .info-card span { font-size: 8px; opacity: 0.4; text-transform: uppercase; }
        
        .record-val { color: var(--gold) !important; text-shadow: 0 0 5px rgba(255, 204, 0, 0.3); }

        .fade-out { transition: opacity 3s ease-out !important; opacity: 0 !important; }

        .tornado-marker { 
            font-size: 40px; text-align: center; 
            animation: spin var(--speed, 2s) infinite linear; 
            filter: drop-shadow(0 0 15px red);
            transition: opacity 3s ease-out;
            cursor: pointer;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .leaflet-popup-content-wrapper { background: var(--card); color: #fff; border: 1px solid var(--border); border-radius: 12px; }
        .leaflet-popup-tip { background: var(--card); }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="map"></div>

    <div class="info-grid">
        <div class="info-card"><span>РЕКОРД САЙТА</span><b id="top-record" class="record-val">0 КМ/Ч</b></div>
        <div class="info-card"><span>MAX ВЕТЕР</span><b id="wind-val">--</b></div>
        <div class="info-card"><span>ОБЪЕКТЫ</span><b id="obj-val">0</b></div>
    </div>
</div>

<script>
    let map, activeTornadoes = {};
    const points = [
        {id: 1, lat: 35.4, lon: -97.5, name: 'Oklahoma'}, 
        {id: 2, lat: 49.9, lon: 36.2, name: 'Kharkiv'}, 
        {id: 3, lat: 31.9, lon: -99.9, name: 'Texas'},
        {id: 4, lat: 41.1, lon: -98.2, name: 'Nebraska'}
    ];

    function getFujita(w) {
        if (w < 117) return "F0";
        if (w < 181) return "F1";
        if (w < 253) return "F2";
        if (w < 332) return "F3";
        return "F4+";
    }

    window.onload = () => {
        map = L.map('map', { zoomControl: false }).setView([35, -40], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        document.getElementById('top-record').innerText = (localStorage.getItem('tornado_top') || 0) + " КМ/Ч";

        const savedHistory = JSON.parse(localStorage.getItem('active_history') || '{}');
        points.forEach(p => { p.history = savedHistory[p.id] || []; });

        update();
        setInterval(update, 10000);
    };

    async function update() {
        let found = 0;
        let topW = 0;
        let historyToSave = {};

        for (let p of points) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current=wind_gusts_10m,wind_direction_10m&_=${Date.now()}`);
                const data = await res.json();
                const wind = Math.round(data.current.wind_gusts_10m);
                const angle = data.current.wind_direction_10m;

                if (wind > topW) topW = wind;

                if (wind > 30) { 
                    found++;
                    const fRank = getFujita(wind);
                    
                    // Обновление рекорда
                    let record = parseInt(localStorage.getItem('tornado_top') || 0);
                    if(wind > record) {
                        localStorage.setItem('tornado_top', wind);
                        document.getElementById('top-record').innerText = wind + " КМ/Ч";
                    }

                    const rad = angle * (Math.PI / 180);
                    p.lat += Math.cos(rad) * 0.02;
                    p.lon += Math.sin(rad) * 0.02;
                    p.history.push([p.lat, p.lon]);
                    if(p.history.length > 40) p.history.shift();

                    if (activeTornadoes[p.id]) {
                        const obj = activeTornadoes[p.id];
                        if(obj.marker.getElement()) obj.marker.getElement().classList.remove('fade-out');
                        obj.marker.setLatLng([p.lat, p.lon]);
                        obj.line.setLatLngs(p.history);
                        obj.marker.getPopup().setContent(`<b>${p.name}</b><br>Скорость: ${wind} км/ч<br>Ранг: ${fRank}`);
                    } else {
                        const m = L.marker([p.lat, p.lon], {
                            icon: L.divIcon({ className: 'none', html: `<div class="tornado-marker">🌪️</div>`, iconSize: [40, 40] })
                        }).addTo(map).bindPopup(`<b>${p.name}</b><br>Скорость: ${wind} км/ч<br>Ранг: ${fRank}`);
                        const l = L.polyline(p.history, {color: 'red', weight: 2, opacity: 0.6}).addTo(map);
                        activeTornadoes[p.id] = { marker: m, line: l };
                    }
                    historyToSave[p.id] = p.history;
                } else if (activeTornadoes[p.id]) {
                    const obj = activeTornadoes[p.id];
                    if (obj.marker.getElement()) obj.marker.getElement().classList.add('fade-out');
                    setTimeout(() => {
                        if (activeTornadoes[p.id] && wind <= 30) {
                            map.removeLayer(obj.marker);
                            map.removeLayer(obj.line);
                            delete activeTornadoes[p.id];
                        }
                    }, 3000);
                    p.history = [];
                }
            } catch (e) {}
        }
