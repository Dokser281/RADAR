<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR v17.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --accent: #ff3b30; --blue: #007aff; --gold: #ffcc00; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #main-ui { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; box-sizing: border-box; height: 100vh; }
        #map { height: 60vh; border-radius: 20px; border: 1px solid var(--border); background: #000; margin-bottom: 10px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .info-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 15px; text-align: center; }
        .info-card b { font-size: 14px; color: var(--blue); display: block; margin-top: 4px; }
        .info-card span { font-size: 8px; opacity: 0.4; text-transform: uppercase; }

        /* СТИЛЬ РЕКОРДА */
        .record-val { color: var(--gold) !important; font-weight: 900; }
        
        .tornado-marker { font-size: 40px; animation: spin var(--speed, 2s) infinite linear; filter: drop-shadow(0 0 15px red); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-clear { background: none; border: none; color: var(--accent); font-size: 8px; cursor: pointer; opacity: 0.5; margin-top: 5px; }
        .btn-clear:hover { opacity: 1; }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="map"></div>

    <div class="info-grid">
        <div class="info-card">
            <span>РЕКОРД СКОРОСТИ</span>
            <b id="top-record" class="record-val">0 КМ/Ч</b>
        </div>
        <div class="info-card">
            <span>MAX ВЕТЕР СЕЙЧАС</span>
            <b id="wind-val">--</b>
        </div>
        <div class="info-card">
            <span>АРХИВ ПУТЕЙ</span>
            <b id="archive-count">0</b>
            <button class="btn-clear" onclick="clearAll()">СБРОСИТЬ ВСЕ</button>
        </div>
    </div>
</div>

<script>
    let map, activeTornadoes = {};
    const points = [
        {id: 1, lat: 35.4, lon: -97.5, name: 'Oklahoma', history: []}, 
        {id: 2, lat: 49.9, lon: 36.2, name: 'Kharkiv', history: []}, 
        {id: 3, lat: 31.9, lon: -99.9, name: 'Texas', history: []},
        {id: 4, lat: 41.1, lon: -98.2, name: 'Nebraska', history: []}
    ];

    window.onload = () => {
        map = L.map('map', { zoomControl: false }).setView([30, -30], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // Загружаем рекорд и архив
        document.getElementById('top-record').innerText = (localStorage.getItem('tornado_top') || 0) + " КМ/Ч";
        loadArchive();
        update();
        setInterval(update, 10000);
    };

    function saveToArchive(path) {
        let archive = JSON.parse(localStorage.getItem('tornado_archive') || '[]');
        archive.push(path);
        if(archive.length > 20) archive.shift(); 
        localStorage.setItem('tornado_archive', JSON.stringify(archive));
        document.getElementById('archive-count').innerText = archive.length;
    }

    function loadArchive() {
        const archive = JSON.parse(localStorage.getItem('tornado_archive') || '[]');
        document.getElementById('archive-count').innerText = archive.length;
        archive.forEach(coords => {
            L.polyline(coords, {color: '#333', weight: 1, opacity: 0.3}).addTo(map);
        });
    }

    function updateRecord(currentWind) {
        let top = parseInt(localStorage.getItem('tornado_top') || 0);
        if (currentWind > top) {
            localStorage.setItem('tornado_top', currentWind);
            document.getElementById('top-record').innerText = currentWind + " КМ/Ч";
        }
    }

    function clearAll() {
        if(confirm('Удалить рекорд и все пути?')) {
            localStorage.clear();
            location.reload();
        }
    }

    async function update() {
        let topW = 0;
        for (let p of points) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current=wind_gusts_10m,wind_direction_10m&_=${Date.now()}`);
                const data = await res.json();
                const wind = Math.round(data.current.wind_gusts_10m);
                const angle = data.current.wind_direction_10m;

                if (wind > topW) topW = wind;

                if (wind > 30) { 
                    updateRecord(wind); // Проверяем на новый рекорд

                    const rad = angle * (Math.PI / 180);
                    p.lat += Math.cos(rad) * 0.02;
                    p.lon += Math.sin(rad) * 0.02;
                    p.history.push([p.lat, p.lon]);

                    if (activeTornadoes[p.id]) {
                        activeTornadoes[p.id].marker.setLatLng([p.lat, p.lon]);
                        activeTornadoes[p.id].line.setLatLngs(p.history);
                    } else {
                        const m = L.marker([p.lat, p.lon], {
                            icon: L.divIcon({ className: 'none', html: `<div class="tornado-marker">🌪️</div>`, iconSize: [40, 40] })
                        }).addTo(map);
                        const l = L.polyline(p.history, {color: 'red', weight: 2}).addTo(map);
                        activeTornadoes[p.id] = { marker: m, line: l };
                    }
                } else if (activeTornadoes[p.id]) {
                    saveToArchive(p.history);
                    map.removeLayer(activeTornadoes[p.id].marker);
                    map.removeLayer(activeTornadoes[p.id].line);
                    delete activeTornadoes[p.id];
                    p.history = [];
                }
            } catch (e) {}
        }
        document.getElementById('wind-val').innerText = topW + " КМ/Ч";
    }
</script>
</body>
</html>
