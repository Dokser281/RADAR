<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR v18.4 | VECTOR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --blue: #007aff; --gold: #ffcc00; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #main-ui { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; box-sizing: border-box; height: 100vh; display: flex; flex-direction: column; }
        #map { flex-grow: 1; min-height: 60vh; border-radius: 20px; border: 1px solid var(--border); background: #050505; margin-bottom: 15px; }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 10px; }
        .info-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 15px; text-align: center; }
        .info-card b { font-size: 14px; color: var(--blue); display: block; margin-top: 4px; }
        .info-card span { font-size: 8px; opacity: 0.4; text-transform: uppercase; }
        .tornado-marker { font-size: 40px; text-align: center; animation: spin 0.5s infinite linear; filter: drop-shadow(0 0 15px red); cursor: pointer; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-out { transition: opacity 3s; opacity: 0 !important; }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="map"></div>
    <div class="info-grid">
        <div class="info-card"><span>РЕКОРД</span><b id="top-record" style="color:var(--gold)">0 КМ/Ч</b></div>
        <div class="info-card"><span>MAX ВЕТЕР</span><b id="wind-val">--</b></div>
        <div class="info-card"><span>ОБЪЕКТЫ</span><b id="obj-val">0</b></div>
    </div>
</div>

<script>
    let map, activeTornadoes = {};
    const points = [
        {id: 1, lat: 35.4, lon: -97.5, name: 'Oklahoma', vx: 0, vy: 0}, 
        {id: 2, lat: 49.9, lon: 36.2, name: 'Kharkiv', vx: 0, vy: 0}, 
        {id: 3, lat: 31.9, lon: -99.9, name: 'Texas', vx: 0, vy: 0},
        {id: 4, lat: 41.1, lon: -98.2, name: 'Nebraska', vx: 0, vy: 0}
    ];

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([30, -30], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        setTimeout(() => { map.invalidateSize(); }, 500);
        
        document.getElementById('top-record').innerText = (localStorage.getItem('tornado_top') || 0) + " КМ/Ч";
        
        requestAnimationFrame(smoothMove); // Запуск плавного движения
        updateData();
        setInterval(updateData, 10000);
    }

    // Функция ПЛАВНОГО движения каждую долю секунды
    function smoothMove() {
        for (let p of points) {
            if (activeTornadoes[p.id]) {
                // Применяем векторную скорость к координатам
                p.lat += p.vx;
                p.lon += p.vy;
                
                activeTornadoes[p.id].marker.setLatLng([p.lat, p.lon]);
                
                // Обновляем линию раз в несколько кадров для оптимизации
                p.history.push([p.lat, p.lon]);
                if(p.history.length > 100) p.history.shift();
                activeTornadoes[p.id].line.setLatLngs(p.history);
            }
        }
        requestAnimationFrame(smoothMove);
    }

    async function updateData() {
        let found = 0; let maxW = 0;
        for (let p of points) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current=wind_gusts_10m,wind_direction_10m&_=${Date.now()}`);
                const data = await res.json();
                const wind = Math.round(data.current.wind_gusts_10m);
                const angle = data.current.wind_direction_10m;

                if (wind > maxW) maxW = wind;

                if (wind > 30) {
                    found++;
                    // Рассчитываем ВЕКТОР скорости (vx, vy)
                    const speedMultiplier = 0.00005; // Настройка скорости дрейфа
                    const rad = (angle - 90) * (Math.PI / 180);
                    p.vx = -Math.sin(rad) * speedMultiplier;
                    p.vy = Math.cos(rad) * speedMultiplier;

                    if (!activeTornadoes[p.id]) {
                        p.history = [[p.lat, p.lon]];
                        const m = L.marker([p.lat, p.lon], {
                            icon: L.divIcon({ className: 'none', html: `<div class="tornado-marker">🌪️</div>`, iconSize: [40, 40] })
                        }).addTo(map).bindPopup(`<b>${p.name}</b><br>${wind} км/ч`);
                        const l = L.polyline(p.history, {color: 'red', weight: 2, opacity: 0.5}).addTo(map);
                        activeTornadoes[p.id] = { marker: m, line: l };
                    }
                } else if (activeTornadoes[p.id]) {
                    // Убираем маркер если ветер стих
                    const obj = activeTornadoes[p.id];
                    if(obj.marker.getElement()) obj.marker.getElement().classList.add('fade-out');
                    setTimeout(() => { 
                        map.removeLayer(obj.marker); map.removeLayer(obj.line); 
                        delete activeTornadoes[p.id]; 
                    }, 3000);
                }
            } catch (e) {}
        }
        document.getElementById('obj-val').innerText = found;
        document.getElementById('wind-val').innerText = maxW + " КМ/Ч";
    }

    window.onload = initMap;
</script>
</body>
</html>
